<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETPULSE - Testador Real de Conexão</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&display=swap" rel="stylesheet">
    <script src="speedtest.js"></script>
    <style>
        /* O SEU CSS ORIGINAL FOI MANTIDO AQUI */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Orbitron', sans-serif; }
        body { background-color: #060608; color: #fff; min-height: 100vh; padding: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .brand-header { text-align: center; margin-bottom: 20px; }
        .brand-header h1 { font-size: 26px; font-weight: 900; color: #fff; text-shadow: 0 0 15px #00f0ff; letter-spacing: 2px; }
        .brand-header p { font-size: 10px; color: #6c7284; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }

        .page-wrapper { display: flex; align-items: flex-start; justify-content: center; gap: 25px; width: 100%; max-width: 1100px; }
        .center-column { display: flex; flex-direction: column; align-items: center; flex: 1 1 auto; max-width: 580px; width: 100%; }

        .test-container { background-color: #0f1015; border: 2px solid #00f0ff; border-radius: 16px; width: 100%; padding: 30px; box-shadow: 0 0 30px rgba(0, 240, 255, 0.15); text-align: center; position: relative; }

        .ad-slot { background-color: #0a0b0e; border: 1px dashed #2c3142; display: flex; align-items: center; justify-content: center; color: #454d66; font-size: 11px; font-weight: bold; border-radius: 8px; text-transform: uppercase; letter-spacing: 1px; text-align: center; }
        .ad-top { width: 100%; height: 90px; margin-bottom: 20px; }
        .ad-footer { width: 100%; height: 90px; margin-top: 20px; }
        
        .sidebar-ad-column { display: flex; flex-direction: column; gap: 20px; width: 160px; flex-shrink: 0; }
        .ad-sidebar-box { height: 285px; width: 160px; }

        @media (max-width: 950px) { .sidebar-ad-column { display: none; } }

        .title { font-size: 18px; text-shadow: 0 0 10px #00f0ff; margin-bottom: 25px; font-weight: 900; color: #00f0ff; }

        .gauge-wrapper { position: relative; width: 260px; height: 260px; margin: 0 auto 25px; display: flex; justify-content: center; align-items: center; }
        .gauge-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: rotate(135deg); }
        .gauge-bg { fill: none; stroke: #14161d; stroke-width: 12; stroke-linecap: round; stroke-dasharray: 471; }
        .gauge-progress { fill: none; stroke: #00f0ff; stroke-width: 12; stroke-linecap: round; stroke-dasharray: 471; stroke-dashoffset: 471; transition: stroke-dashoffset 0.1s linear, stroke 0.3s; }

        .gauge-ticks { position: absolute; width: 100%; height: 100%; pointer-events: none; }
        .tick { position: absolute; width: 2px; height: 10px; background-color: #2c3142; left: calc(50% - 1px); transform-origin: 50% 130px; }
        .tick-active { box-shadow: 0 0 8px currentColor; }

        .gauge-center-info { z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; margin-top: -10px; }
        .current-speed { font-size: 46px; font-weight: 900; color: #fff; line-height: 1; }
        .unit { font-size: 14px; color: #00f0ff; margin-top: 10px; font-weight: bold; }

        .results-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .result-box { background-color: #0a0b0e; border: 1px solid #1f222e; border-radius: 10px; padding: 15px 10px; }
        .result-box label { font-size: 11px; color: #6c7284; display: block; margin-bottom: 8px; text-transform: uppercase; font-weight: bold; }
        .result-box span { font-size: 16px; font-weight: 900; }
        
        .start-btn { background: linear-gradient(135deg, #00f0ff 0%, #0072ff 100%); color: #fff; border: none; padding: 16px; border-radius: 50px; font-size: 16px; font-weight: 900; cursor: pointer; width: 100%; box-shadow: 0 0 20px rgba(0, 240, 255, 0.4); }
    </style>
</head>
<body>

    <div class="brand-header">
        <h1>NETPULSE</h1>
    </div>

    <div class="page-wrapper">
        <div class="sidebar-ad-column">
            <div class="ad-slot ad-sidebar-box">ANÚNCIO 1</div>
            <div class="ad-slot ad-sidebar-box">ANÚNCIO 2</div>
        </div>

        <div class="center-column">
            <div class="ad-slot ad-top">ANÚNCIO TOPO</div>

            <div class="test-container">
                <div class="title">CONSOLE DE MEDIÇÃO</div>
                <div class="gauge-wrapper">
                    <svg class="gauge-svg" viewBox="0 0 260 260">
                        <circle class="gauge-bg" cx="130" cy="130" r="75"></circle>
                        <circle class="gauge-progress" id="progress-bar" cx="130" cy="130" r="75"></circle>
                    </svg>
                    <div class="gauge-ticks" id="tick-container"></div>
                    <div class="gauge-center-info">
                        <div class="current-speed" id="live-speed">0.0</div>
                        <div class="unit">Mbps</div>
                    </div>
                </div>
                <div class="results-grid">
                    <div class="result-box"><label>Ping</label><span id="ping-val">-</span></div>
                    <div class="result-box"><label>Download</label><span id="download-val">-</span></div>
                    <div class="result-box"><label>Upload</label><span id="upload-val">-</span></div>
                </div>
                <button class="start-btn" id="start-btn">GO</button>
            </div>

            <div class="ad-slot ad-footer">ANÚNCIO RODAPÉ</div>
        </div>

        <div class="sidebar-ad-column">
            <div class="ad-slot ad-sidebar-box">ANÚNCIO 3</div>
            <div class="ad-slot ad-sidebar-box">ANÚNCIO 4</div>
        </div>
    </div>

    <script>
        var s = new Speedtest();
        const startBtn = document.getElementById('start-btn');
        const liveSpeed = document.getElementById('live-speed');
        const progressBar = document.getElementById('progress-bar');
        const tickContainer = document.getElementById('tick-container');

        // Cria os ticks
        for (let i = 0; i <= 25; i++) {
            let t = document.createElement('div');
            t.className = 'tick';
            t.style.transform = `rotate(${-135 + (i * 10.8)}deg)`;
            tickContainer.appendChild(t);
        }

        startBtn.onclick = () => {
            startBtn.disabled = true;
            s.onTestStatus = (st) => {
                let v = (st.download / 1e6) || (st.upload / 1e6) || 0;
                liveSpeed.innerText = v.toFixed(1);
                progressBar.style.strokeDashoffset = 471 - (Math.min(v / 140, 1) * 471);
            };
            s.onResult = (res) => {
                document.getElementById('download-val').innerText = (res.download / 1e6).toFixed(1);
                document.getElementById('upload-val').innerText = (res.upload / 1e6).toFixed(1);
                document.getElementById('ping-val').innerText = res.ping.toFixed(0);
                startBtn.disabled = false;
            };
            s.start();
        };
    </script>
</body>
</html>
